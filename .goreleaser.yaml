before:
  hooks:
    - go mod tidy
builds:
  - id: az-ssh
    binary: az-ssh
    main: ./cmd/azure-ssh-tui/main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - format: tar.gz
    # this name template makes the OS and Arch show up in the tar.gz name
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
brews:
  - name: az-ssh
    repository:
      owner: shyamnborole
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/shyamnborole/azure-ssh-tui"
    description: "A fast, beautiful TUI for managing Azure VMs and SSH connections."
    caveats: |
      ⚠️ This application requires the Azure CLI (az) to be installed and authenticated.
      If you don't have it, run: brew install azure-cli
    test: |
      system "#{bin}/az-ssh --version"
